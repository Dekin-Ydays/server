server:
  port: 8090
  forward-headers-strategy: framework
  use-forward-headers: true
  tomcat:
    remote-ip-header: X-Forwarded-For
    protocol-header: X-Forwarded-Proto
    protocol-header-https-value: https
    port-header: X-Forwarded-Port
    port-header-https-value: 443
  ssl:
    enabled: false

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jwt_security}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # En production, on valide seulement
    show-sql: false # Désactivé en production
    properties:
      hibernate:
        format_sql: false
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
# Configuration spécifique pour forcer HTTPS
app:
  force-https: true
  jwt:
    secret: ${JWT_SECRET}
  #base-url: https://dominant-skylark-civil.ngrok-free.app
