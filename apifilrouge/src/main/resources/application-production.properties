# Port dynamique (compatible avec tous les services cloud)
server.port=${PORT:8090}

# Base de donnťes PostgreSQL gťnťrique
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA pour PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Pool de connexions optimisť
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BASE_URL}/login/oauth2/code/google

# URLs autorisťes
app.oauth2.allowed-redirect-uris=${ALLOWED_REDIRECT_URIS:https://veevent.vercel.app,https://veevent-admin.vercel.app}

# Configuration des erreurs
server.error.include-message=always
server.error.include-binding-errors=always

# Headers pour reverse proxy
server.forward-headers-strategy=framework
server.use-forward-headers=true