server.port=${PORT:8090}

# Database configuration (uses individual variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JWT
app.jwt.secret=${JWT_SECRET}

# OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${BASE_URL}/login/oauth2/code/google
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

# Swagger config
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Email SMTP configuration
email.smtp.host=${EMAIL_SMTP_HOST:smtp.gmail.com}
email.smtp.port=${EMAIL_SMTP_PORT:587}
email.smtp.username=${EMAIL_SMTP_USERNAME}
email.smtp.password=${EMAIL_SMTP_PASSWORD}
email.from.address=${EMAIL_FROM_ADDRESS}
# Other config
app.oauth2.allowed-redirect-uris=${ALLOWED_REDIRECT_URIS:https://veevent.vercel.app,https://veevent-admin.vercel.app,https://event-website-veevent.vercel.app}
server.error.include-message=always
server.error.include-binding-errors=always
server.forward-headers-strategy=framework

